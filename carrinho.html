<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho | VOID</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">VOID</a>
    <nav class="nav-actions">
      <a href="produtos.html">Produtos</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="perfil.html">Conta</a>
      <a href="admin.html" data-admin-only>Admin</a>
    </nav>
  </header>

  <main class="cart-page">
    <section class="cart-items">
      <div class="page-heading compact">
        <span class="eyebrow">Sacola</span>
        <h1>Seu Carrinho</h1>
      </div>
      <p id="cart-empty" class="empty-state">Nenhum produto no carrinho.</p>
      <div id="cart-container"></div>
    </section>

    <aside class="cart-summary">
      <h2>Resumo</h2>
      <div class="summary-row">
        <span>Itens</span>
        <strong id="cart-count">0</strong>
      </div>
      <div class="summary-row">
        <span>Frete</span>
        <strong>Grátis</strong>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <strong id="cart-total">R$ 0,00</strong>
      </div>
      <a href="checkout.html" class="checkout-btn">Finalizar Compra</a>
      <a href="produtos.html" class="secondary-btn full">Continuar comprando</a>
    </aside>
  </main>

  <script src="app.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
