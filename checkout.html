<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | VOID</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">VOID</a>
    <nav class="nav-actions">
      <a href="produtos.html">Produtos</a>
      <a href="carrinho.html">Carrinho <span class="cart-badge" data-cart-count>0</span></a>
      <a href="perfil.html">Conta</a>
      <a href="admin.html" data-admin-only>Admin</a>
    </nav>
  </header>

  <main class="checkout-page">
    <section class="checkout-form">
      <div class="page-heading compact">
        <span class="eyebrow">Pedido</span>
        <h1>Finalizar Compra</h1>
        <p>Esta V1 cria o pedido no Firestore. O pagamento real entra na próxima integração.</p>
      </div>

      <form id="checkoutForm">
        <div class="form-grid two">
          <input id="customerName" type="text" placeholder="Nome completo" required>
          <input id="customerEmail" type="email" placeholder="Email" required>
          <input id="customerPhone" type="tel" placeholder="Telefone/WhatsApp" required>
          <input id="customerCep" type="text" placeholder="CEP" required>
          <input id="customerAddress" type="text" placeholder="Endereço" required>
          <input id="customerNumber" type="text" placeholder="Número" required>
          <input id="customerComplement" type="text" placeholder="Complemento">
        </div>

        <h2>Pagamento</h2>
        <div class="payment-options">
          <label><input type="radio" name="payment" value="PIX" checked> PIX</label>
          <label><input type="radio" name="payment" value="Cartão"> Cartão</label>
          <label><input type="radio" name="payment" value="Boleto"> Boleto</label>
        </div>

        <button class="finish-order" type="submit">Criar Pedido</button>
        <p id="checkoutMessage" class="form-message"></p>
      </form>
    </section>

    <aside class="checkout-summary">
      <h2>Resumo</h2>
      <div id="checkoutSummaryItems"></div>
      <hr>
      <div class="summary-item total">
        <span>Total</span>
        <strong id="checkoutTotal">R$ 0,00</strong>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="firestore-products.js"></script>
</body>
</html>
